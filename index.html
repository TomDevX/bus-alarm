<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BusAlert v12 - Precision</title>
    
    <script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet" />
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #f8f9fa; /* Màu nền sáng kiểu Google */
            --card: #ffffff;
            --accent: #1a73e8; /* Google Blue */
            --text: #202124;
            --red: #d93025;
            --border: #dadce0;
            --font-main: 'Roboto', sans-serif;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: var(--text); font-family: var(--font-main); 
            margin: 0; padding-bottom: 40px; overflow-x: hidden;
        }
        .container { max-width: 450px; margin: 0 auto; padding: 20px; }
        
        /* Google Maps Style Hero */
        .hero { 
            background: var(--card);
            padding: 30px 10px; text-align: center; border-radius: 16px; 
            border: 1px solid var(--border); margin-bottom: 20px;
            box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
        }
        .dist-val { 
            font-family: 'Space Mono'; font-size: 68px; color: var(--accent); 
            font-weight: 900; letter-spacing: -2px;
        }
        .label { font-size: 12px; color: #70757a; font-weight: 500; text-transform: uppercase; margin-top: 5px; }

        .card { 
            background: var(--card); padding: 20px; border-radius: 16px; 
            border: 1px solid var(--border); margin-bottom: 16px; 
        }
        
        input {
            width: 100%; background: #fff; border: 1px solid var(--border); 
            color: var(--text); padding: 14px; border-radius: 8px; font-family: var(--font-main);
            font-size: 16px; outline: none; margin-bottom: 10px;
        }
        input:focus { border: 2px solid var(--accent); padding: 13px; }
        
        .suggestions {
            position: absolute; top: 60px; left: 0; right: 0; 
            background: #fff; border: 1px solid var(--border);
            border-radius: 8px; z-index: 2000; display: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .suggestion-item { padding: 12px; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 14px; }
        .suggestion-item:hover { background: #f1f3f4; }

        #map-frame { position: relative; border-radius: 16px; overflow: hidden; margin: 15px 0; border: 1px solid var(--border); height: 300px; }
        #map { height: 100%; width: 100%; }

        .btn { 
            width: 100%; padding: 16px; border-radius: 24px; border: none; 
            font-weight: 700; cursor: pointer; font-family: var(--font-main); 
            font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: background 0.2s;
        }
        .btn-start { background: var(--accent); color: white; }
        .btn-start:hover { background: #1765cc; }
        .btn-stop { background: var(--red); color: white; }
        .btn-secondary { background: #fff; color: var(--accent); border: 1px solid var(--border); margin-bottom: 8px; }
        
        #alarm-overlay { 
            position: fixed; inset: 0; background: var(--red); z-index: 9999; 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            text-align: center; color: white; padding: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="hero">
        <div class="dist-val" id="displayDist">0.000</div>
        <div class="label">Km tới điểm đến</div>
    </div>

    <div class="card">
        <span class="label">🎯 Tìm kiếm điểm đến</span>
        <div style="position:relative;">
            <input type="text" id="searchInput" placeholder="Nhập địa chỉ..." oninput="handleSearch(this.value)">
            <div id="suggestions" class="suggestions"></div>
        </div>
        <button class="btn btn-secondary" onclick="getCurrentLocationAsTarget()">📍 Vị trí hiện tại</button>
        <div style="display: flex; gap: 8px; margin-top:10px;">
            <input type="number" id="targetLat" placeholder="Lat" readonly style="font-size:12px; background:#f1f3f4;">
            <input type="number" id="targetLng" placeholder="Lng" readonly style="font-size:12px; background:#f1f3f4;">
        </div>
    </div>

    <div id="map-frame"><div id="map"></div></div>

    <div class="card">
        <span class="label">🔔 Bán kính báo động (km)</span>
        <input type="number" id="threshold" value="0.500" step="0.001" style="text-align:center; color:var(--accent); font-weight:800;">
    </div>

    <button id="mainBtn" class="btn btn-start" onclick="toggleTracking()">Bắt đầu giám sát</button>
</div>

<div id="alarm-overlay">
    <h1 style="font-size: 80px; margin: 0;">🚨</h1>
    <h2 style="font-size: 32px; font-weight: 900;">ĐÃ ĐẾN NƠI!</h2>
    <p>Nhấn xác nhận để tắt báo thức.</p>
    <button class="btn" style="width:200px; background:white; color:black; margin-top:20px;" onclick="stopAlarm()">XÁC NHẬN</button>
</div>

<audio id="silentAudio" loop><source src="https://raw.githubusercontent.com/anars/blank-audio/master/10-seconds-of-silence.mp3"></audio>

<script>
let map, myMarker, targetMarker, watchId;
let isTracking = false;
let audioCtx = null;
let alarmInterval = null;

function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

function playBeep() {
    initAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(880, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.5);
}

function startAlarmSound() { playBeep(); alarmInterval = setInterval(playBeep, 1000); }

function initMap() {
    map = new maplibregl.Map({
        container: 'map',
        style: {
            version: 8,
            sources: { 'osm': { type: 'raster', tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'], tileSize: 256 } },
            layers: [{ id: 'osm', type: 'raster', source: 'osm' }]
        },
        center: [106.660172, 10.762622],
        zoom: 14
    });
    myMarker = new maplibregl.Marker({ color: '#1a73e8' }).setLngLat([106.660172, 10.762622]).addTo(map);
    map.on('click', (e) => setTarget(e.lngLat.lat, e.lngLat.lng, "Điểm đã chọn"));
}

async function handleSearch(query) {
    const suggBox = document.getElementById('suggestions');
    if (query.length < 3) { suggBox.style.display = 'none'; return; }
    try {
        const res = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&limit=5&lat=10.76&lon=106.66`);
        const data = await res.json();
        suggBox.innerHTML = data.features.map(f => `
            <div class="suggestion-item" onclick="selectLoc(${f.geometry.coordinates[1]}, ${f.geometry.coordinates[0]}, '${f.properties.name || f.properties.street || 'Địa điểm'}')">
                <b>${f.properties.name || ''}</b><br><small>${f.properties.city || ''} ${f.properties.street || ''}</small>
            </div>
        `).join('');
        suggBox.style.display = 'block';
    } catch (e) {}
}

function selectLoc(lat, lng, name) {
    document.getElementById('suggestions').style.display = 'none';
    document.getElementById('searchInput').value = name;
    setTarget(lat, lng, name);
}

function setTarget(lat, lng, name) {
    document.getElementById('targetLat').value = lat.toFixed(6);
    document.getElementById('targetLng').value = lng.toFixed(6);
    if (targetMarker) targetMarker.remove();
    targetMarker = new maplibregl.Marker({ color: '#d93025' }).setLngLat([lng, lat]).addTo(map);
    map.flyTo({ center: [lng, lat], zoom: 16 });
}

function getCurrentLocationAsTarget() {
    initAudio();
    navigator.geolocation.getCurrentPosition((pos) => {
        setTarget(pos.coords.latitude, pos.coords.longitude, "Vị trí của bạn");
    }, null, { enableHighAccuracy: true });
}

function toggleTracking() { initAudio(); isTracking ? stopTracking() : startTracking(); }

async function startTracking() {
    const tLat = parseFloat(document.getElementById('targetLat').value);
    const tLng = parseFloat(document.getElementById('targetLng').value);
    if (!tLat || !tLng) return;

    isTracking = true;
    updateUI(true);
    document.getElementById('silentAudio').play().catch(() => {});
    if ('wakeLock' in navigator) try { await navigator.wakeLock.request('screen'); } catch (e) {}

    watchId = navigator.geolocation.watchPosition((pos) => {
        const { latitude, longitude } = pos.coords;
        myMarker.setLngLat([longitude, latitude]);
        const dist = haversine(latitude, longitude, tLat, tLng);
        
        // Hiển thị 3 chữ số thập phân
        document.getElementById('displayDist').textContent = dist.toFixed(3);
        
        if (dist <= parseFloat(document.getElementById('threshold').value)) triggerAlarm();
    }, null, { enableHighAccuracy: true, maximumAge: 0 });
}

function stopTracking() {
    isTracking = false;
    navigator.geolocation.clearWatch(watchId);
    document.getElementById('silentAudio').pause();
    updateUI(false);
}

function updateUI(active) {
    const btn = document.getElementById('mainBtn');
    btn.textContent = active ? "NGỪNG GIÁM SÁT" : "BẮT ĐẦU GIÁM SÁT";
    btn.className = active ? "btn btn-stop" : "btn btn-start";
}

function triggerAlarm() {
    document.getElementById('alarm-overlay').style.display = 'flex';
    startAlarmSound();
    if (navigator.vibrate) navigator.vibrate([1000, 500, 1000]);
}

function stopAlarm() {
    document.getElementById('alarm-overlay').style.display = 'none';
    clearInterval(alarmInterval);
    stopTracking();
}

function haversine(lat1, lon1, lat2, lon2) {
    const R = 6371; 
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

window.onload = initMap;
</script>
</body>
</html>
